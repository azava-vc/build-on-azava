<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; padding: 2rem; max-width: 960px; margin: 0 auto; color: #1a1a1a; }
    h1 { margin-bottom: 1.5rem; }
    .card { border: 1px solid #e0e0e0; border-radius: 8px; padding: 1.5rem; margin-bottom: 1rem; }
    .card h2 { font-size: 0.875rem; text-transform: uppercase; letter-spacing: 0.05em; color: #666; margin-bottom: 0.5rem; }
    .card .value { font-size: 2rem; font-weight: 600; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 0.5rem; border-bottom: 1px solid #e0e0e0; }
    th { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #666; }
    .loading { color: #999; }
  </style>
</head>
<body>
  <h1>Dashboard</h1>
  <div class="grid" id="stats"></div>
  <div id="content"></div>

  <script>
    // All data comes from named queries defined in src/web/queries.ts
    // The frontend never touches the Azava API directly.

    async function query(name, params = {}) {
      const qs = new URLSearchParams(params).toString();
      const res = await fetch(`/query/${name}${qs ? `?${qs}` : ""}`);
      if (!res.ok) throw new Error(`${res.status}: ${await res.text()}`);
      return res.json();
    }

    async function load() {
      try {
        const schema = await query("schema");
        const nodeTypes = schema.nodeTypes || schema.node_types || [];

        const stats = document.getElementById("stats");
        stats.innerHTML = `
          <div class="card">
            <h2>Node Types</h2>
            <div class="value">${nodeTypes.length}</div>
          </div>
        `;

        const content = document.getElementById("content");
        if (nodeTypes.length) {
          content.innerHTML = `
            <table>
              <thead><tr><th>Name</th><th>Category</th></tr></thead>
              <tbody>
                ${nodeTypes.map(t => `<tr><td>${t.name || t.label}</td><td>${t.category || "\u2014"}</td></tr>`).join("")}
              </tbody>
            </table>
          `;
        }
      } catch (err) {
        document.getElementById("stats").innerHTML = `<p class="loading">Could not load data: ${err.message}</p>`;
      }
    }

    load();
  </script>
</body>
</html>
