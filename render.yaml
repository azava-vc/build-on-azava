services:
  # Dashboard — Next.js app
  - type: web
    name: dashboard
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - fromGroup: azava

  # Cron jobs — one entry per scheduled task
  # Each runs: npx tsx src/run.ts <job-name>

  - type: cron
    name: example-sync
    runtime: node
    schedule: "0 8 * * 1-5" # Weekdays at 8am UTC
    buildCommand: npm install
    startCommand: npx tsx src/run.ts example-sync
    envVars:
      - fromGroup: azava

envVarGroups:
  - name: azava
    envVars:
      - key: BASE_URL
        sync: false
      - key: AZAVA_API_URL
        sync: false
      - key: AZAVA_API_KEY
        sync: false
      - key: AZAVA_APP_URL
        sync: false
      - key: NOTIFY_WEBHOOK_URL
        sync: false
      - key: AZAVA_OAUTH_CLIENT_ID
        sync: false
      - key: AZAVA_OAUTH_CLIENT_SECRET
        sync: false
      - key: SESSION_SECRET
        sync: false
